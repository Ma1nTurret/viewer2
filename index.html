<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>연속 이미지 뷰어</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 상단 고정 UI -->
    <div id="ui-container">
        <label for="file-input" class="file-btn">폴더/파일 선택</label>
        <input type="file" id="file-input" multiple accept="image/*">
        
        <!-- 🌟 사진처럼 생긴 페이지 선택 드롭다운 -->
        <select id="page-select" disabled>
            <option value="0">0</option>
        </select>
    </div>

    <!-- 이미지가 이어붙여질 영역 -->
    <div id="viewer">
        <div class="empty-message">위 버튼을 눌러 이미지를 선택해주세요.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
